<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バレーボール分析レポートシステム - 完全版</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; padding-bottom: 140px; }
        .container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 95%; max-width: 1100px; text-align: center; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* 入力フォーム */
        .setup-box { background:#fff; border:1px solid #ddd; padding:20px; border-radius:12px; margin-bottom:20px; text-align: left; }
        .setup-box label { display: block; margin-top: 10px; font-weight: bold; }
        .setup-box input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        /* ナビゲーション */
        .nav-tabs { display: none; width: 100%; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 10px; }
        .nav-tabs button { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; background: #ddd; cursor: pointer; font-size: 0.75rem; }
        .nav-tabs button.active-tab { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* スコア推移 */
        .score-timeline { width: 100%; overflow-x: auto; background: #fff; border: 1px solid #ccc; border-radius: 10px; margin: 15px 0; padding: 10px 0; white-space: nowrap; }
        .timeline-row { display: flex; align-items: center; min-height: 40px; padding: 0 10px; }
        .row-label { min-width: 85px; font-size: 0.75rem; font-weight: bold; position: sticky; left: 0; background: #fff; z-index: 5; border-right: 2px solid #eee; text-align: center; }
        .point-dot { min-width: 26px; height: 26px; border-radius: 50%; margin: 0 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; font-weight: bold; flex-shrink: 0; }
        .dot-ours { background-color: #28a745; border: 2px solid #1e7e34; }
        .dot-opp { background-color: #dc3545; border: 2px solid #bd2130; }
        .spacer { min-width: 34px; flex-shrink: 0; }

        /* ボタンUI */
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .char-btn { width: 100%; height: 75px; font-size: 0.95rem; font-weight: bold; border: 1px solid #ddd; border-radius: 12px; cursor: pointer; background: white; }
        .main-action-btn { width: 100%; padding: 18px; font-size: 1rem; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .active-mode { border: 4px solid #000 !important; transform: scale(1.05); }
        .btn-undo { width: 100%; background: #6c757d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        .spike-btn-front { background: white; color: black; border: 1px solid #ddd; }
        .spike-btn-back { background: #e0e0e0; color: #333; border: 1px solid #bbb; }

        /* テーブル */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; min-width: 1000px; font-size: 0.65rem; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 4px 1px; text-align: center; }
        th { background: #444; color: white; }
        .calc-cell { background: #f0f7ff; font-weight: bold; }

        /* 印刷設定 */
        @media print {
            .hide-on-print, .nav-tabs, .sticky-scoreboard, .btn-undo, .main-action-btn { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .container { box-shadow: none; width: 100%; max-width: none; padding: 0; }
            .table-wrapper { overflow: visible; }
            table { min-width: auto; width: 100%; page-break-inside: avoid; }
            .score-timeline { overflow: visible; white-space: normal; border: none; }
        }

        .sticky-scoreboard { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        #next-set-btn { display:none; background: #ff9800; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-game-setup" class="screen active hide-on-print">
        <h2>試合基本情報 📝</h2>
        <div class="setup-box">
            <label>試合日</label><input type="date" id="game-date">
            <label>自チーム名</label><input type="text" id="team-ours" placeholder="自チーム">
            <label>対戦相手名</label><input type="text" id="team-opp" placeholder="相手チーム">
        </div>
        <div class="setup-box">
            <strong>選手名簿 (Excel貼り付け可)</strong><br>
            <textarea id="paste-area" style="width:100%; height:80px; margin:10px 0;" placeholder="1 田中&#13;&#10;2 佐藤..."></textarea>
            <button onclick="importFromPaste()">読み込み実行</button>
            <div id="member-registry" class="button-grid" style="margin-top:10px; grid-template-columns: repeat(3, 1fr);"></div>
        </div>
        <button class="main-action-btn" style="background:#28a745" onclick="showSetSetup()">次へ進む</button>
    </div>

    <div id="screen-set-setup" class="screen hide-on-print">
        <h2 id="set-setup-title">第1セット 開始準備</h2>
        <div class="setup-box">
            <h3>コート背番号入力 (選手1〜6, リベロ)</h3>
            <div id="court-selection" class="button-grid" style="grid-template-columns: repeat(3, 1fr);"></div>
        </div>
        <button class="main-action-btn" style="background:#007AFF" onclick="startSet('serve')">自チームサーブ開始</button>
        <button class="main-action-btn" style="background:#ff9800" onclick="startSet('receive')">相手サーブ開始</button>
    </div>

    <div id="record-area" class="hide-on-print" style="display:none;">
        <div id="nav-tabs" class="nav-tabs">
            <button id="tab-serve" onclick="showScreen('screen-serve')">サーブ</button>
            <button id="tab-catch" onclick="showScreen('screen-catch')">レシーブ</button>
            <button id="tab-spike" onclick="showScreen('screen-spike')">スパイク</button>
            <button id="tab-block" onclick="showScreen('screen-block')">ブロック</button>
        </div>

        <div id="screen-serve" class="screen">
            <h3 id="serve-title">サーバー: -</h3>
            <div class="button-grid">
                <button class="char-btn" style="border-color:#28a745;" onclick="recordServe('ace')">エース</button>
                <button class="char-btn" style="border-color:#ffc107;" onclick="recordServe('effect')">効果</button>
                <button class="char-btn" style="border-color:#dc3545;" onclick="recordServe('miss')">ミス</button>
            </div>
            <button class="main-action-btn" style="background:#007AFF" onclick="recordServe('normal')">打つ (ラリーへ)</button>
        </div>

        <div id="screen-catch" class="screen">
            <h3>レシーブ評価</h3>
            <div class="button-grid" id="catch-players"></div>
            <button class="main-action-btn" style="background:#ff9800" onclick="completeReceive()">レシーブ完了</button>
            <button class="char-btn" style="color:#dc3545; width:100%;" onclick="recordOppAce()">相手エース</button>
        </div>

        <div id="screen-spike" class="screen">
            <h3>スパイク</h3>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
                <button id="mode-win" class="main-action-btn" style="background:#28a745; flex:1;" onclick="setSpikeMode('win')">決定</button>
                <button id="mode-fail" class="main-action-btn" style="background:#dc3545; flex:1;" onclick="setSpikeMode('fail')">ミス</button>
                <button id="mode-two-step" class="main-action-btn" style="background:#ff9800; flex:1;" onclick="toggleTwoStep()">2段</button>
            </div>
            <div class="button-grid" id="spike-grid"></div>
            <div class="button-grid">
                <button class="char-btn" style="color:#28a745;" onclick="score(true); showScreen('screen-serve')">相手ミス</button>
                <button class="char-btn" style="color:#dc3545;" onclick="score(false); showScreen('screen-catch')">相手得点</button>
            </div>
        </div>

        <div id="screen-block" class="screen">
            <h3>ブロック得点（前衛のみ）</h3>
            <div class="button-grid" id="block-grid"></div>
        </div>
        
        <button id="next-set-btn" class="main-action-btn" onclick="finishSet()">このセットを終了して次へ</button>
        <button class="btn-undo" onclick="undo()">１つ戻る</button>
    </div>

    <div id="report-section">
        <div id="game-summary" style="text-align:left;"></div>
        <div id="set-results-container"></div>
        <button id="pdf-btn" class="main-action-btn hide-on-print" style="background:#555; display:none; margin-top:20px;" onclick="window.print()">📊 PDFとして保存 / 印刷</button>
    </div>
</div>

<div id="scoreboard" class="sticky-scoreboard hide-on-print" style="display:none;">
    <div style="font-size:2rem; font-weight:bold;" id="our-score">0</div>
    <div id="set-counts" style="font-weight:bold;">0 - 0</div>
    <div style="font-size:2rem; font-weight:bold;" id="opp-score">0</div>
</div>

<script>
    let allSetsData = [], currentSetNum = 1, setWinOurs = 0, setWinOpp = 0;
    let stats = [], courtMembers = [-1,-1,-1,-1,-1,-1,-1], history = [];
    let ourScore = 0, oppScore = 0, currentServerIdx = 5, hasServeRight = true, spikeMode = 'normal', isTwoStepMode = false;
    
    const serveOrder = [2, 1, 0, 3, 4, 5]; 
    const posNames = ["選手1", "選手2", "選手3", "選手4", "選手5", "選手6", "リベロ"];

    // 初期化
    const regDiv = document.getElementById('member-registry');
    for(let i=0; i<15; i++) regDiv.innerHTML += `<div><input type="number" class="reg-no" style="width:35px;"><input type="text" class="reg-name" style="width:75px;"></div>`;
    const courtDiv = document.getElementById('court-selection');
    for(let i=0; i<7; i++) courtDiv.innerHTML += `<div><small>${posNames[i]}</small><br><input type="number" class="court-no" style="width:50px;"></div>`;

    function importFromPaste() {
        const lines = document.getElementById('paste-area').value.trim().split('\n');
        lines.forEach((l, i) => {
            const p = l.split(/[\t\s,]+/);
            if(document.querySelectorAll('.reg-no')[i]) {
                document.querySelectorAll('.reg-no')[i].value = p[0] || '';
                document.querySelectorAll('.reg-name')[i].value = p[1] || '';
            }
        });
    }

    function showSetSetup() {
        document.getElementById('screen-game-setup').classList.remove('active');
        document.getElementById('screen-set-setup').classList.add('active');
        document.getElementById('set-setup-title').innerText = `第${currentSetNum}セット 開始準備`;
    }

    function startSet(mode) {
        if(allSetsData.length === 0) {
            stats = [];
            document.querySelectorAll('.reg-no').forEach((el, i) => {
                const no = el.value, name = document.querySelectorAll('.reg-name')[i].value || `No.${no}`;
                if(no) stats.push({ no, name, serve:{total:0, ace:0, effect:0, miss:0}, receive:{total:0, A:0, B:0, C:0, fail:0}, spike:{win:0, fail:0, total:0, backCount:0}, twoStep:{win:0, fail:0, total:0}, block:{win:0} });
            });
        } else {
            stats = stats.map(s => ({...s, serve:{total:0, ace:0, effect:0, miss:0}, receive:{total:0, A:0, B:0, C:0, fail:0}, spike:{win:0, fail:0, total:0, backCount:0}, twoStep:{win:0, fail:0, total:0}, block:{win:0}}));
        }

        document.querySelectorAll('.court-no').forEach((el, i) => {
            courtMembers[i] = stats.findIndex(s => s.no == el.value);
        });

        ourScore = 0; oppScore = 0; hasServeRight = (mode === 'serve'); currentServerIdx = 5;
        document.getElementById('screen-set-setup').classList.remove('active');
        document.getElementById('record-area').style.display = 'block';
        document.getElementById('nav-tabs').style.display = 'flex';
        document.getElementById('scoreboard').style.display = 'flex';
        document.getElementById('pdf-btn').style.display = 'block';

        const tlId = `timeline-set-${currentSetNum}`;
        document.getElementById('set-results-container').innerHTML += `
            <div id="container-${tlId}">
                <h3 style="margin-top:30px; border-left:5px solid #333; padding-left:10px;">第${currentSetNum}セット</h3>
                <div class="score-timeline">
                    <div class="timeline-row" id="ours-${tlId}"><div class="row-label">自チーム</div></div>
                    <div class="timeline-row" id="opp-${tlId}"><div class="row-label">相手</div></div>
                </div>
                <div id="table-${tlId}" class="table-wrapper"></div>
            </div>`;

        updateUI();
        refreshInterface();
        showScreen(hasServeRight ? 'screen-serve' : 'screen-catch');
    }

    function saveState(scr) { history.push({ ourScore, oppScore, currentServerIdx, hasServeRight, stats: JSON.parse(JSON.stringify(stats)), courtMembers: [...courtMembers], screen: scr, timelineOurs: document.getElementById(`ours-timeline-set-${currentSetNum}`).innerHTML, timelineOpp: document.getElementById(`opp-timeline-set-${currentSetNum}`).innerHTML }); }

    function score(ours) {
        if(ours) { ourScore++; if(!hasServeRight) { currentServerIdx = (currentServerIdx + 1) % 6; hasServeRight = true; } }
        else { oppScore++; hasServeRight = false; }
        updateUI(); updateTimeline(ours); checkSetEnd(); refreshInterface();
    }

    function updateTimeline(ours) {
        const tlId = `timeline-set-${currentSetNum}`;
        const dot = `<div class="point-dot ${ours ? 'dot-ours' : 'dot-opp'}">${ours ? ourScore : oppScore}</div>`;
        document.getElementById(`ours-${tlId}`).innerHTML += ours ? dot : '<div class="spacer"></div>';
        document.getElementById(`opp-${tlId}`).innerHTML += ours ? '<div class="spacer"></div>' : dot;
    }

    function checkSetEnd() {
        const target = (currentSetNum === 5) ? 15 : 25;
        const isEnd = (ourScore >= target || oppScore >= target) && Math.abs(ourScore - oppScore) >= 2;
        document.getElementById('next-set-btn').style.display = isEnd ? 'block' : 'none';
    }

    function refreshInterface() {
        const sd = document.getElementById('spike-grid'), cd = document.getElementById('catch-players'), bd = document.getElementById('block-grid');
        sd.innerHTML = ""; cd.innerHTML = ""; bd.innerHTML = "";
        
        const frontIdxsInOrder = [(currentServerIdx + 1) % 6, (currentServerIdx + 2) % 6, (currentServerIdx + 3) % 6];
        const frontCourtPos = frontIdxsInOrder.map(idx => serveOrder[idx]);

        courtMembers.forEach((idx, i) => {
            if(idx === -1) return;
            const name = stats[idx].name;
            const isFront = frontCourtPos.includes(i);
            const isBack = (i === 6) || !isFront;

            sd.innerHTML += `<button class="char-btn ${isBack ? 'spike-btn-back' : 'spike-btn-front'}" onclick="hitSpike(${i}, ${isBack})">${name}${isBack ? '<br><small>(Back)</small>' : ''}</button>`;
            cd.innerHTML += `<button class="char-btn" id="cbtn-${i}" onclick="toggleRec(${i})">${name}</button>`;
            if(isFront) bd.innerHTML += `<button class="char-btn" onclick="hitBlockPoint(${i})">${name}</button>`;
        });
        const sIdx = courtMembers[serveOrder[currentServerIdx]];
        document.getElementById('serve-title').innerText = `サーバー: ${stats[sIdx] ? stats[sIdx].name : '-'}`;
    }

    function recordServe(type) {
        const sIdx = courtMembers[serveOrder[currentServerIdx]];
        stats[sIdx].serve.total++;
        if(type === 'ace') { stats[sIdx].serve.ace++; score(true); showScreen('screen-serve'); }
        else if(type === 'effect') { stats[sIdx].serve.effect++; showScreen('screen-spike'); }
        else if(type === 'miss') { stats[sIdx].serve.miss++; score(false); showScreen('screen-catch'); }
        else showScreen('screen-spike');
    }

    function toggleRec(pos) {
        const btn = document.getElementById(`cbtn-${pos}`), sIdx = courtMembers[pos];
        const opts = [stats[sIdx].name, 'A', 'B', 'C', '失'];
        let idx = (opts.indexOf(btn.innerText) + 1) % opts.length;
        btn.innerText = opts[idx];
        btn.style.background = (opts[idx] === '失') ? '#ffcccc' : (opts[idx] !== stats[sIdx].name ? '#eef6ff' : 'white');
    }

    function completeReceive() {
        courtMembers.forEach((idx, i) => {
            const val = document.getElementById(`cbtn-${i}`).innerText;
            if(val !== stats[idx].name) {
                stats[idx].receive.total++;
                if(val === 'A') stats[idx].receive.A++;
                else if(val === 'B') stats[idx].receive.B++;
                else if(val === 'C') stats[idx].receive.C++;
                else if(val === '失') { stats[idx].receive.fail++; score(false); showScreen('screen-catch'); return; }
            }
        });
        showScreen('screen-spike');
    }

    function hitSpike(pos, isBack) {
        const sIdx = courtMembers[pos];
        if(isTwoStepMode) {
            stats[sIdx].twoStep.total++;
            if(spikeMode === 'win') { stats[sIdx].twoStep.win++; score(true); showScreen('screen-serve'); }
            else if(spikeMode === 'fail') { stats[sIdx].twoStep.fail++; score(false); showScreen('screen-catch'); }
        } else {
            stats[sIdx].spike.total++;
            if(isBack) stats[sIdx].spike.backCount++;
            if(spikeMode === 'win') { stats[sIdx].spike.win++; score(true); showScreen('screen-serve'); }
            else if(spikeMode === 'fail') { stats[sIdx].spike.fail++; score(false); showScreen('screen-catch'); }
        }
        spikeMode = 'normal'; isTwoStepMode = false; updateSpikeModeUI();
    }

    function finishSet() {
        if(ourScore > oppScore) setWinOurs++; else setWinOpp++;
        allSetsData.push({ setNum: currentSetNum, score: {ours: ourScore, opp: oppScore}, stats: JSON.parse(JSON.stringify(stats)) });
        renderSetTable(currentSetNum);
        if(setWinOurs === 3 || setWinOpp === 3 || currentSetNum === 5) finalizeGame();
        else { currentSetNum++; document.getElementById('record-area').style.display = 'none'; showSetSetup(); }
    }

    function renderSetTable(num) {
        const data = allSetsData[num-1];
        let html = `<table><thead><tr><th>名前</th><th colspan="5">サーブ</th><th colspan="6">レシーブ</th><th colspan="3">スパイク</th><th>B</th></tr><tr style="font-size:0.5rem;"><td></td><td>計</td><td>エ</td><td>効</td><td>失</td><td>率</td><td>計</td><td>A</td><td>B</td><td>C</td><td>失</td><td>率</td><td>決</td><td>失</td><td>率</td><td>得</td></tr></thead><tbody>`;
        data.stats.forEach(p => {
            const sEff = p.serve.total ? (((p.serve.ace * 100) + (p.serve.effect * 25) - (p.serve.miss * 25)) / p.serve.total).toFixed(1) : "0.0";
            const rSuc = p.receive.total ? (((p.receive.A * 100) + (p.receive.B * 50)) / p.receive.total).toFixed(1) : "0.0";
            const spEff = p.spike.total ? ((p.spike.win - p.spike.fail) / p.spike.total).toFixed(2) : "0.00";
            html += `<tr><td>${p.name}</td><td>${p.serve.total}</td><td>${p.serve.ace}</td><td>${p.serve.effect}</td><td>${p.serve.miss}</td><td class="calc-cell">${sEff}%</td><td>${p.receive.total}</td><td>${p.receive.A}</td><td>${p.receive.B}</td><td>${p.receive.C}</td><td>${p.receive.fail}</td><td class="calc-cell">${rSuc}%</td><td>${p.spike.win}</td><td>${p.spike.fail}</td><td class="calc-cell">${spEff}</td><td>${p.block.win}</td></tr>`;
        });
        document.getElementById(`table-timeline-set-${num}`).innerHTML = html + `</tbody></table>`;
    }

    function finalizeGame() {
        document.getElementById('record-area').style.display = 'none';
        document.getElementById('scoreboard').style.display = 'none';
        const date = document.getElementById('game-date').value, tOurs = document.getElementById('team-ours').value, tOpp = document.getElementById('team-opp').value;
        document.getElementById('game-summary').innerHTML = `<h2>${date} 試合結果</h2><p style="font-size:1.5rem; font-weight:bold;">${tOurs} ${setWinOurs} - ${setWinOpp} ${tOpp}</p>`;
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function updateUI() { document.getElementById('our-score').innerText = ourScore; document.getElementById('opp-score').innerText = oppScore; document.getElementById('set-counts').innerText = `${setWinOurs} - ${setWinOpp}`; }
    function setSpikeMode(m) { spikeMode = (spikeMode === m) ? 'normal' : m; updateSpikeModeUI(); }
    function toggleTwoStep() { isTwoStepMode = !isTwoStepMode; updateSpikeModeUI(); }
    function updateSpikeModeUI() { document.getElementById('mode-win').classList.toggle('active-mode', spikeMode === 'win'); document.getElementById('mode-fail').classList.toggle('active-mode', spikeMode === 'fail'); document.getElementById('mode-two-step').classList.toggle('active-mode', isTwoStepMode); }
    function hitBlockPoint(pos) { stats[courtMembers[pos]].block.win++; score(true); showScreen('screen-serve'); }
</script>

</body>
</html>
