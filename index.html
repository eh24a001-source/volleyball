<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バレーボール記録 - 分析プロ版</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; padding-bottom: 140px; }
        .container { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 95%; max-width: 900px; text-align: center; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* ナビゲーション */
        .nav-tabs { display: none; width: 100%; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 10px; }
        .nav-tabs button { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; background: #ddd; cursor: pointer; font-size: 0.75rem; }
        .nav-tabs button.active-tab { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* スコアライン */
        #score-timeline-container { width: 100%; overflow-x: auto; background: #fff; border: 1px solid #ccc; border-radius: 10px; margin: 15px 0; padding: 10px 0; white-space: nowrap; }
        .timeline-row { display: flex; align-items: center; min-height: 40px; padding: 0 10px; }
        .row-label { min-width: 85px; font-size: 0.75rem; font-weight: bold; position: sticky; left: 0; background: #fff; z-index: 5; border-right: 2px solid #eee; text-align: center; }
        .point-dot { min-width: 26px; height: 26px; border-radius: 50%; margin: 0 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; font-weight: bold; flex-shrink: 0; }
        .dot-ours { background-color: #28a745; border: 2px solid #1e7e34; }
        .dot-opp { background-color: #dc3545; border: 2px solid #bd2130; }
        .spacer { min-width: 34px; flex-shrink: 0; }

        /* ボタン */
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .char-btn { width: 100%; height: 75px; font-size: 0.95rem; font-weight: bold; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; background: white; }
        .main-action-btn { width: 100%; padding: 18px; font-size: 1.2rem; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .active-mode { border: 4px solid #000 !important; transform: scale(1.05); }
        .btn-undo { width: 100%; background: #6c757d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .view-data-btn { width: 100%; padding: 12px; background: #555; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* モーダル */
        #sub-modal, #edit-popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:85%; max-width:350px; background:white; z-index:3000; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,0.3); padding:20px; text-align:center; }
        .edit-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .adjust-btn { width: 60px; height: 60px; font-size: 1.5rem; border-radius: 12px; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; }
        .close-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: white; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* テーブル */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; min-width: 600px; font-size: 0.65rem; }
        th, td { border: 1px solid #ddd; padding: 4px 1px; text-align: center; }
        th { background: #444; color: white; }
        td.editable { color: #007AFF; font-weight: bold; cursor: pointer; }
        .calc-cell { background: #f0f7ff; font-weight: bold; color: #333; }

        .sticky-scoreboard { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }

        /* データ表示モード用 */
        .only-data .hide-on-data { display: none !important; }
        #back-to-record { display: none; margin-bottom: 20px; background: #007AFF; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; }
        .only-data #back-to-record { display: block; }
    </style>
</head>
<body id="main-body">

<div class="container">
    <button id="back-to-record" onclick="toggleDataView(false)">← 記録画面に戻る</button>

    <div id="screen-setup" class="screen active hide-on-data">
        <h2>試合準備 🏐</h2>
        <div class="import-box" style="background:#eef6ff; border:2px dashed #007AFF; border-radius:10px; padding:15px; margin-bottom:20px;">
            <strong>Excel貼り付け</strong><br>
            <textarea id="paste-area" style="width:90%; height:60px; margin:10px 0;" placeholder="1 田中&#13;&#10;2 佐藤..."></textarea><br>
            <button onclick="importFromPaste()">読み込み実行</button>
        </div>
        <div id="member-registry" class="button-grid" style="grid-template-columns: repeat(3, 1fr); gap:8px;"></div>
        <hr>
        <h3>コート背番号入力</h3>
        <div id="court-selection" class="button-grid" style="grid-template-columns: repeat(3, 1fr); gap:8px;"></div>
        <button class="main-action-btn" style="background:#007AFF" onclick="startGame('serve')">サーブから開始</button>
        <button class="main-action-btn" style="background:#ff9800" onclick="startGame('receive')">レシーブから開始</button>
    </div>

    <div id="nav-tabs" class="nav-tabs hide-on-data">
        <button id="tab-serve" onclick="showScreen('screen-serve')">サーブ</button>
        <button id="tab-catch" onclick="showScreen('screen-catch')">レシーブ</button>
        <button id="tab-spike" onclick="showScreen('screen-spike')">スパイク</button>
        <button id="tab-block" onclick="showScreen('screen-block')">ブロック</button>
    </div>

    <div id="edit-popup">
        <h3 id="edit-title">名前 (カテゴリ)</h3>
        <div class="edit-controls">
            <button class="adjust-btn" onclick="updateEditValue(-1)">-1</button>
            <div id="edit-value" style="font-size:3rem; font-weight:bold; min-width:60px;">0</div>
            <button class="adjust-btn" onclick="updateEditValue(1)">+1</button>
        </div>
        <button class="close-btn" onclick="closeEditModal()">閉じる</button>
    </div>

    <div id="sub-modal">
        <h4>選手交代</h4>
        <div id="sub-selection-grid" class="button-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom:10px;"></div>
        <input type="number" id="sub-new-number" placeholder="新背番号" style="font-size:1.5rem; width:100px; padding:5px;">
        <div style="margin-top:15px;">
            <button onclick="executeSubstitution()" style="background:#28a745; color:white; padding:12px 20px; border-radius:8px; border:none; font-weight:bold;">交代実行</button>
            <button onclick="closeSubModal()" style="margin-left:10px; padding:12px; border-radius:8px; border:1px solid #ccc;">戻る</button>
        </div>
    </div>

    <div id="screen-serve" class="screen hide-on-data">
        <h3 id="serve-title">サーバー: -</h3>
        <div class="button-grid">
            <button class="char-btn" style="border-color:#28a745;" onclick="recordServe('ace')">エース</button>
            <button class="char-btn" style="border-color:#ffc107;" onclick="recordServe('effect')">効果</button>
            <button class="char-btn" style="border-color:#dc3545;" onclick="recordServe('miss')">ミス</button>
        </div>
        <button class="main-action-btn" style="background:#007AFF" onclick="recordServe('normal')">打つ (ラリーへ)</button>
        <button class="btn-undo" onclick="undo()">１つ前に戻る</button>
    </div>

    <div id="screen-catch" class="screen hide-on-data">
        <h3>レシーブ評価 (A→B→C→失)</h3>
        <div class="button-grid" id="catch-players"></div>
        <button class="main-action-btn" style="background:#ff9800" onclick="completeReceive()">レシーブ完了 (攻撃へ)</button>
        <div class="button-grid">
            <button class="char-btn" style="color:#dc3545; border-color:#dc3545;" onclick="recordOppAce()">相手エース</button>
            <button class="char-btn" style="color:#28a745; border-color:#28a745;" onclick="score(true); resetCatchButtons(); showScreen('screen-serve')">相手ミス</button>
            <button class="char-btn" style="background:#6f42c1; color:white; border:none;" onclick="openSubModal()">選手交代</button>
        </div>
        <button class="btn-undo" onclick="undo()">１つ前に戻る</button>
    </div>

    <div id="screen-spike" class="screen hide-on-data">
        <h3>スパイク</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button id="mode-win" class="main-action-btn" style="background:#28a745; flex:1" onclick="setSpikeMode('win')">決定モード</button>
            <button id="mode-fail" class="main-action-btn" style="background:#dc3545; flex:1" onclick="setSpikeMode('fail')">ミスモード</button>
        </div>
        <div class="button-grid" id="spike-grid"></div>
        <div class="button-grid">
            <button class="char-btn" style="color:#28a745; border-color:#28a745;" onclick="score(true); resetCatchButtons(); showScreen('screen-serve')">相手ミス</button>
            <button class="char-btn" style="color:#dc3545; border-color:#dc3545;" onclick="score(false); resetCatchButtons(); showScreen('screen-catch')">相手得点</button>
            <button class="char-btn" style="background:#6f42c1; color:white; border:none;" onclick="openSubModal()">選手交代</button>
        </div>
        <button class="btn-undo" onclick="undo()">１つ前に戻る</button>
    </div>

    <div id="screen-block" class="screen hide-on-data">
        <h3>ブロック得点</h3>
        <div class="button-grid" id="block-grid"></div>
        <div class="button-grid">
            <button class="char-btn" style="color:#28a745; border-color:#28a745;" onclick="score(true); resetCatchButtons(); showScreen('screen-serve')">相手ミス</button>
            <button class="char-btn" style="color:#dc3545; border-color:#dc3545;" onclick="score(false); resetCatchButtons(); showScreen('screen-catch')">相手得点</button>
            <button class="char-btn" style="background:#6f42c1; color:white; border:none;" onclick="openSubModal()">選手交代</button>
        </div>
        <button class="btn-undo" onclick="undo()">１つ前に戻る</button>
    </div>

    <div id="data-section">
        <div id="score-timeline-container" style="display:none;"><div class="timeline-row" id="timeline-ours"><div class="row-label">自チーム</div></div><div class="timeline-row" id="timeline-opp"><div class="row-label">相手</div></div></div>
        <div class="table-wrapper">
            <table id="main-stats-table" style="display:none;">
                <thead>
                    <tr><th>名前</th><th colspan="5">サーブ</th><th colspan="6">レシーブ</th><th colspan="4">スパイク</th><th>B</th></tr>
                    <tr style="font-size:0.5rem;"><td></td><td>計</td><td>エ</td><td>効</td><td>失</td><td>効果率</td><td>計</td><td>A</td><td>B</td><td>C</td><td>失</td><td>成功率</td><td>決</td><td>失</td><td>計</td><td>効果率</td><td>得</td></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <button id="view-data-global" class="view-data-btn hide-on-data" style="display:none;" onclick="toggleDataView(true)">📈 データ表示</button>
    </div>
</div>

<div id="scoreboard" class="sticky-scoreboard hide-on-data" style="display:none;"><div style="font-size:2rem; font-weight:bold;" id="our-score">0</div><div>vs</div><div style="font-size:2rem; font-weight:bold;" id="opp-score">0</div></div>

<script>
    let stats = [], courtMembers = [-1,-1,-1,-1,-1,-1,-1], history = [];
    let ourScore = 0, oppScore = 0, currentServerIdx = 0, hasServeRight = true, spikeMode = 'normal', subTargetPos = -1, editTarget = null;
    const serveOrder = [5, 2, 1, 0, 3, 4], posNames = ["選手1", "選手2", "選手3", "選手4", "選手5", "選手6", "リベロ"];

    function toggleDataView(onlyData) { document.getElementById('main-body').classList.toggle('only-data', onlyData); }

    const regDiv = document.getElementById('member-registry');
    for(let i=0; i<15; i++) regDiv.innerHTML += `<div class="member-input" style="background:#fff; padding:5px; border:1px solid #ccc; border-radius:5px; display:flex; flex-direction:column;"><input type="number" placeholder="No." class="reg-no" style="font-size:0.75rem;"><input type="text" placeholder="名前" class="reg-name" style="font-size:0.75rem;"></div>`;
    const courtDiv = document.getElementById('court-selection');
    for(let i=0; i<7; i++) courtDiv.innerHTML += `<div><small>${posNames[i]}</small><br><input type="number" class="court-no" style="width:50px;"></div>`;

    function saveState(scr) { history.push({ ourScore, oppScore, currentServerIdx, hasServeRight, stats: JSON.parse(JSON.stringify(stats)), courtMembers: [...courtMembers], timelineOurs: document.getElementById('timeline-ours').innerHTML, timelineOpp: document.getElementById('timeline-opp').innerHTML, screen: scr }); }

    function undo() {
        if (!history.length) return;
        const last = history.pop();
        ourScore = last.ourScore; oppScore = last.oppScore; currentServerIdx = last.currentServerIdx; hasServeRight = last.hasServeRight; stats = last.stats; courtMembers = last.courtMembers;
        document.getElementById('timeline-ours').innerHTML = last.timelineOurs; document.getElementById('timeline-opp').innerHTML = last.timelineOpp;
        document.getElementById('our-score').innerText = ourScore; document.getElementById('opp-score').innerText = oppScore;
        renderTable(); refreshInterface(); showScreen(last.screen);
    }

    function openEditModal(pIdx, cat, sub) {
        editTarget = { pIdx, cat, sub };
        document.getElementById('edit-title').innerText = `${stats[pIdx].name} (${sub})`;
        document.getElementById('edit-value').innerText = stats[pIdx][cat][sub];
        document.getElementById('edit-popup').style.display = 'block';
    }
    function updateEditValue(delta) {
        if (!editTarget) return;
        saveState(document.querySelector('.screen.active').id);
        const { pIdx, cat, sub } = editTarget;
        stats[pIdx][cat][sub] = Math.max(0, stats[pIdx][cat][sub] + delta);
        document.getElementById('edit-value').innerText = stats[pIdx][cat][sub];
        renderTable();
    }
    function closeEditModal() { document.getElementById('edit-popup').style.display = 'none'; editTarget = null; }

    function startGame(mode) {
        stats = [];
        document.querySelectorAll('.reg-no').forEach((el, i) => {
            const no = el.value, name = document.querySelectorAll('.reg-name')[i].value || `No.${no}`;
            if(no) stats.push({ no, name, serve:{total:0, ace:0, effect:0, miss:0}, receive:{total:0, A:0, B:0, C:0, fail:0}, spike:{win:0, fail:0, total:0}, block:{win:0} });
        });
        document.querySelectorAll('.court-no').forEach((el, i) => {
            const no = el.value;
            let sIdx = stats.findIndex(s => s.no == no);
            if(sIdx === -1 && no) { stats.push({ no, name: `No.${no}`, serve:{total:0, ace:0, effect:0, miss:0}, receive:{total:0, A:0, B:0, C:0, fail:0}, spike:{win:0, fail:0, total:0}, block:{win:0} }); sIdx = stats.length - 1; }
            courtMembers[i] = sIdx;
        });
        hasServeRight = (mode === 'serve');
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('nav-tabs').style.display = 'flex';
        document.getElementById('scoreboard').style.display = 'flex';
        document.getElementById('score-timeline-container').style.display = 'block';
        document.getElementById('main-stats-table').style.display = 'table';
        document.getElementById('view-data-global').style.display = 'block';
        renderTable(); refreshInterface(); showScreen(hasServeRight ? 'screen-serve' : 'screen-catch');
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        stats.forEach((p, i) => {
            // 計算処理
            const sEff = p.serve.total ? (((p.serve.ace * 100) + (p.serve.effect * 25) - (p.serve.miss * 25)) / p.serve.total).toFixed(1) : "0.0";
            const rSuc = p.receive.total ? (((p.receive.A * 100) + (p.receive.B * 50)) / p.receive.total).toFixed(1) : "0.0";
            const spEff = p.spike.total ? ((p.spike.win - p.spike.fail) / p.spike.total).toFixed(2) : "0.00";

            tbody.innerHTML += `<tr>
                <td>${p.name}</td>
                <td class="editable" onclick="openEditModal(${i},'serve','total')">${p.serve.total}</td>
                <td class="editable" onclick="openEditModal(${i},'serve','ace')">${p.serve.ace}</td>
                <td class="editable" onclick="openEditModal(${i},'serve','effect')">${p.serve.effect}</td>
                <td class="editable" onclick="openEditModal(${i},'serve','miss')">${p.serve.miss}</td>
                <td class="calc-cell">${sEff}%</td>
                <td class="editable" onclick="openEditModal(${i},'receive','total')">${p.receive.total}</td>
                <td class="editable" onclick="openEditModal(${i},'receive','A')">${p.receive.A}</td>
                <td class="editable" onclick="openEditModal(${i},'receive','B')">${p.receive.B}</td>
                <td class="editable" onclick="openEditModal(${i},'receive','C')">${p.receive.C}</td>
                <td class="editable" onclick="openEditModal(${i},'receive','fail')">${p.receive.fail}</td>
                <td class="calc-cell">${rSuc}%</td>
                <td class="editable" onclick="openEditModal(${i},'spike','win')">${p.spike.win}</td>
                <td class="editable" onclick="openEditModal(${i},'spike','fail')">${p.spike.fail}</td>
                <td class="editable" onclick="openEditModal(${i},'spike','total')">${p.spike.total}</td>
                <td class="calc-cell">${spEff}</td>
                <td class="editable" onclick="openEditModal(${i},'block','win')">${p.block.win}</td>
            </tr>`;
        });
    }

    function refreshInterface() {
        const sd = document.getElementById('spike-grid'), cd = document.getElementById('catch-players'), bd = document.getElementById('block-grid'), sub = document.getElementById('sub-selection-grid');
        sd.innerHTML = ""; cd.innerHTML = ""; bd.innerHTML = ""; sub.innerHTML = "";
        courtMembers.forEach((idx, i) => {
            if(idx === -1) return;
            const name = stats[idx].name;
            sd.innerHTML += `<button class="char-btn" onclick="hitSpike(${i})">${name}</button>`;
            cd.innerHTML += `<button class="char-btn" id="cbtn-${i}" onclick="toggleRec(${i})">${name}</button>`;
            bd.innerHTML += `<button class="char-btn" onclick="hitBlockPoint(${i})">${name}</button>`;
            sub.innerHTML += `<button onclick="setSubTarget(${i})" id="sub-p-${i}" style="padding:10px; border:1px solid #ccc; font-size:0.7rem;">${posNames[i]}<br>(${name})</button>`;
        });
    }

    function toggleRec(pos) {
        const btn = document.getElementById(`cbtn-${pos}`), sIdx = courtMembers[pos];
        const s = stats[sIdx], opts = [s.name, 'A', 'B', 'C', '失'];
        let idx = (opts.indexOf(btn.innerText) + 1) % opts.length;
        btn.innerText = opts[idx];
        btn.style.background = (opts[idx] === '失') ? '#ffcccc' : (opts[idx] !== s.name ? '#eef6ff' : 'white');
    }

    function completeReceive() {
        saveState('screen-catch');
        let lost = false;
        courtMembers.forEach((idx, i) => {
            const val = document.getElementById(`cbtn-${i}`).innerText;
            if(val !== stats[idx].name) {
                stats[idx].receive.total++;
                if(val === 'A') stats[idx].receive.A++;
                else if(val === 'B') stats[idx].receive.B++;
                else if(val === 'C') stats[idx].receive.C++;
                else if(val === '失') { stats[idx].receive.fail++; score(false); lost = true; }
            }
        });
        if(lost) { resetCatchButtons(); showScreen('screen-catch'); } else { showScreen('screen-spike'); }
        renderTable();
    }

    function hitSpike(pos) {
        saveState('screen-spike');
        const sIdx = courtMembers[pos];
        stats[sIdx].spike.total++;
        if(spikeMode === 'win') { stats[sIdx].spike.win++; score(true); resetCatchButtons(); showScreen('screen-serve'); }
        else if(spikeMode === 'fail') { stats[sIdx].spike.fail++; score(false); resetCatchButtons(); showScreen('screen-catch'); }
        spikeMode = 'normal'; setSpikeMode('normal'); renderTable();
    }

    function hitBlockPoint(pos) {
        saveState('screen-block');
        stats[courtMembers[pos]].block.win++;
        score(true); resetCatchButtons(); showScreen('screen-serve'); renderTable();
    }

    function score(ours) {
        if(ours) { ourScore++; if(!hasServeRight) { currentServerIdx = (currentServerIdx + 1) % 6; hasServeRight = true; } } else { oppScore++; hasServeRight = false; }
        document.getElementById('our-score').innerText = ourScore; document.getElementById('opp-score').innerText = oppScore;
        const dot = `<div class="point-dot ${ours ? 'dot-ours' : 'dot-opp'}">${ours ? ourScore : oppScore}</div>`;
        document.getElementById('timeline-ours').innerHTML += ours ? dot : '<div class="spacer"></div>';
        document.getElementById('timeline-opp').innerHTML += ours ? '<div class="spacer"></div>' : dot;
    }

    function recordServe(type) {
        saveState('screen-serve'); 
        const sIdx = courtMembers[serveOrder[currentServerIdx]]; 
        stats[sIdx].serve.total++;
        if(type === 'ace') { stats[sIdx].serve.ace++; score(true); showScreen('screen-serve'); }
        else if(type === 'effect') { stats[sIdx].serve.effect++; showScreen('screen-spike'); } // 修正: 効果をカウントして攻撃画面へ
        else if(type === 'miss') { stats[sIdx].serve.miss++; score(false); resetCatchButtons(); showScreen('screen-catch'); }
        else showScreen('screen-spike'); 
        renderTable();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active-tab'));
        if(id === 'screen-serve') { document.getElementById('tab-serve').classList.add('active-tab'); updateServeTitle(); }
        if(id === 'screen-catch') document.getElementById('tab-catch').classList.add('active-tab');
        if(id === 'screen-spike') document.getElementById('tab-spike').classList.add('active-tab');
        if(id === 'screen-block') document.getElementById('tab-block').classList.add('active-tab');
    }

    function updateServeTitle() { const sIdx = courtMembers[serveOrder[currentServerIdx]]; document.getElementById('serve-title').innerText = `サーバー: ${stats[sIdx] ? stats[sIdx].name : '-'}`; }
    function resetCatchButtons() { courtMembers.forEach((idx, i) => { if(idx !== -1) { const btn = document.getElementById(`cbtn-${i}`); if(btn) { btn.innerText = stats[idx].name; btn.style.background = "white"; } } }); }
    function setSpikeMode(m) { spikeMode = m; document.getElementById('mode-win').classList.toggle('active-mode', m === 'win'); document.getElementById('mode-fail').classList.toggle('active-mode', m === 'fail'); }
    function recordOppAce() { saveState('screen-catch'); score(false); resetCatchButtons(); showScreen('screen-catch'); }
    function openSubModal() { document.getElementById('sub-modal').style.display = 'block'; }
    function closeSubModal() { document.getElementById('sub-modal').style.display = 'none'; }
    function setSubTarget(i) { subTargetPos = i; document.querySelectorAll('#sub-selection-grid button').forEach(b => b.style.borderColor="#ccc"); document.getElementById(`sub-p-${i}`).style.borderColor="blue"; }
    function executeSubstitution() {
        const no = document.getElementById('sub-new-number').value;
        if(subTargetPos === -1 || !no) return;
        saveState(document.querySelector('.screen.active').id);
        let sIdx = stats.findIndex(s => s.no == no);
        if(sIdx === -1) { stats.push({ no, name: `No.${no}`, serve:{total:0, ace:0, effect:0, miss:0}, receive:{total:0, A:0, B:0, C:0, fail:0}, spike:{win:0, fail:0, total:0}, block:{win:0} }); sIdx = stats.length-1; }
        courtMembers[subTargetPos] = sIdx;
        renderTable(); refreshInterface(); closeSubModal(); updateServeTitle();
    }
    function importFromPaste() {
        const lines = document.getElementById('paste-area').value.trim().split('\n');
        lines.forEach((l, i) => { const p = l.split(/[\t\s,]+/); if(document.querySelectorAll('.reg-no')[i]) { document.querySelectorAll('.reg-no')[i].value = p[0] || ''; document.querySelectorAll('.reg-name')[i].value = p[1] || ''; }});
    }
</script>
</body>
</html>
